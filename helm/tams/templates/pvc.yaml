apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tams-server-data
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "tams.name" . }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
