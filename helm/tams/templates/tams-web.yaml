apiVersion: apps/v1
kind: Deployment
metadata:
  name: tams-web
  namespace: {{ .Values.namespace }}
  labels:
    app: tams-web
    app.kubernetes.io/name: {{ include "tams.name" . }}
spec:
  replicas: {{ .Values.replicaCount.web }}
  selector:
    matchLabels:
      app: tams-web
  template:
    metadata:
      labels:
        app: tams-web
    spec:
      {{ include "tams.nodeAffinity" . | indent 6 | trim }}
      containers:
        - name: tams-web
          image: {{ include "tams.webImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5803
          envFrom:
            - configMapRef:
                name: tams-config
          resources: {{ toYaml .Values.resources.web | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 5803
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 5803
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tams-web
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "tams.name" . }}
spec:
  selector:
    app: tams-web
  ports:
    - port: 5803
      targetPort: 5803
