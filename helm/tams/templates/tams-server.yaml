apiVersion: apps/v1
kind: Deployment
metadata:
  name: tams-server
  namespace: {{ .Values.namespace }}
  labels:
    app: tams-server
    app.kubernetes.io/name: {{ include "tams.name" . }}
spec:
  replicas: {{ .Values.replicaCount.server }}
  selector:
    matchLabels:
      app: tams-server
  template:
    metadata:
      labels:
        app: tams-server
    spec:
      {{ include "tams.nodeAffinity" . | indent 6 | trim }}
      containers:
        - name: tams-server
          image: {{ include "tams.serverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5800
          envFrom:
            - secretRef:
                name: tams-b2-credentials
            - configMapRef:
                name: tams-config
          resources: {{ toYaml .Values.resources.server | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api-spec
              port: 5800
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api-spec
              port: 5800
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: tams-server
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "tams.name" . }}
spec:
  selector:
    app: tams-server
  ports:
    - port: 5800
      targetPort: 5800
