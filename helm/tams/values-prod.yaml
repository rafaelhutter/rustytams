# Production overrides – secrets are passed via --set or a separate values-secret.yaml
# image.tag is set via IMAGE_TAG in .env and passed via --set image.tag=...

web:
  title: "MoovIT TAMS"
  logoUrl: "https://moov-rh-dropshare.s3-eu-central-1.amazonaws.com/moovit/moovit.png"

ingress:
  host: tams.moovit24.de
  tls:
    enabled: true
    certManager:
      clusterIssuer: letsencrypt-prod

b2:
  endpoint: s3.eu-central-003.backblazeb2.com
  region: eu-central-003
  bucket: tams-media
  # accessKey and secretKey via --set or values-secret.yaml

tams:
  username: admin
  # password via --set or values-secret.yaml

nodeAffinity:
  excludeHostname: "hc-k8s-cluster-node-1"
